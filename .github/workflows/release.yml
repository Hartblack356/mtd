name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_URL: https://upload.pypi.org/legacy/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Previous tag: $PREV_TAG"

          # Build the changelog entry
          ENTRY="## [$VERSION] - $DATE"$'\n'

          FEATS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s" --grep="^feat" || true)
          if [ -n "$FEATS" ]; then
            ENTRY+=$'\n'"### Added"$'\n'
            ENTRY+=$(echo "$FEATS" | sed 's/^feat: //' | sed 's/^/- /')$'\n'
          fi

          FIXES=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s" --grep="^fix" || true)
          if [ -n "$FIXES" ]; then
            ENTRY+=$'\n'"### Fixed"$'\n'
            ENTRY+=$(echo "$FIXES" | sed 's/^fix: //' | sed 's/^/- /')$'\n'
          fi

          OTHERS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s" --grep="^feat" --grep="^fix" --invert-grep || true)
          if [ -n "$OTHERS" ]; then
            ENTRY+=$'\n'"### Changed"$'\n'
            ENTRY+=$(echo "$OTHERS" | sed 's/^/- /')$'\n'
          fi

          # Insert entry into CHANGELOG.md after [Unreleased]
          sed -i "/^## \[Unreleased\]/a\\\\n${ENTRY}" CHANGELOG.md

          # Commit and push updated CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for $VERSION [skip ci]"
          git push origin HEAD:main

          # Build release body
          {
            echo 'changelog<<EOF'
            echo "$ENTRY"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/*
          generate_release_notes: false
