name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_URL: https://upload.pypi.org/legacy/

      - name: Freeze changelog for release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date +%Y-%m-%d)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)

          # Extract current [Unreleased] content for the GitHub release body
          UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/{ /^## \[/!p; }' CHANGELOG.md | sed '/^$/d')

          # Replace [Unreleased] header content with versioned header
          # Keep [Unreleased] empty and add the versioned section below it
          python3 -c "
          import re
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          # Replace [Unreleased] section: keep header, move content to versioned section
          content = re.sub(
              r'(## \[Unreleased\])\n(.*?)(?=\n## \[|\Z)',
              r'\1\n\n## [$VERSION] - $DATE\n\2',
              content,
              count=1,
              flags=re.DOTALL
          )
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: freeze CHANGELOG for $VERSION [skip ci]"
          git push origin HEAD:main

          # Build release body
          {
            echo 'changelog<<EOF'
            if [ -n "$UNRELEASED" ]; then
              echo "$UNRELEASED"
            else
              echo "Release $VERSION"
            fi
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/*
          generate_release_notes: false
