name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy mtd/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=mtd --cov-report=xml --cov-report=term-missing

      - name: Generate coverage badge
        if: matrix.python-version == '3.14' && github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate']) * 100
          import math
          print(f'{math.floor(rate)}')
          ")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 75 ]; then COLOR="green"
          elif [ "$COVERAGE" -ge 60 ]; then COLOR="yellowgreen"
          elif [ "$COVERAGE" -ge 40 ]; then COLOR="yellow"
          else COLOR="red"; fi
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" -o coverage.svg

      - name: Update changelog
        if: matrix.python-version == '3.14' && github.ref == 'refs/heads/main'
        run: |
          # Get the last changelog update commit or fall back to first commit
          LAST_CHANGELOG=$(git log --all --oneline --grep="ci: update changelog" -1 --format="%H" 2>/dev/null || true)
          if [ -z "$LAST_CHANGELOG" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$LAST_TAG" ]; then
              SINCE="$LAST_TAG"
            else
              SINCE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            SINCE="$LAST_CHANGELOG"
          fi

          # Collect commits since last update (exclude CI commits)
          FEATS=$(git log "$SINCE"..HEAD --pretty=format:"%s" --grep="^feat" | grep -v "\[skip ci\]" || true)
          FIXES=$(git log "$SINCE"..HEAD --pretty=format:"%s" --grep="^fix" | grep -v "\[skip ci\]" || true)
          OTHERS=$(git log "$SINCE"..HEAD --pretty=format:"%s" --grep="^feat" --grep="^fix" --grep="^ci:" --grep="^Merge" --invert-grep | grep -v "\[skip ci\]" || true)

          # Build new entries for [Unreleased]
          ENTRY=""
          if [ -n "$FEATS" ]; then
            ENTRY+=$'\n'"### Added"$'\n'
            ENTRY+=$(echo "$FEATS" | sed 's/^feat: //' | sed 's/^feat(//' | sed 's/): /: /' | sed 's/^/- /')$'\n'
          fi
          if [ -n "$FIXES" ]; then
            ENTRY+=$'\n'"### Fixed"$'\n'
            ENTRY+=$(echo "$FIXES" | sed 's/^fix: //' | sed 's/^fix(//' | sed 's/): /: /' | sed 's/^/- /')$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            ENTRY+=$'\n'"### Changed"$'\n'
            ENTRY+=$(echo "$OTHERS" | sed 's/^docs: //' | sed 's/^refactor: //' | sed 's/^/- /')$'\n'
          fi

          if [ -n "$ENTRY" ]; then
            # Replace [Unreleased] section content
            python3 -c "
          import re
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          # Remove old unreleased content (between [Unreleased] and next ## or EOF)
          content = re.sub(
              r'(## \[Unreleased\])\n.*?(?=\n## \[|$)',
              r'\1\n${ENTRY}\n',
              content,
              count=1,
              flags=re.DOTALL
          )
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          "
          fi

      - name: Commit CI artifacts
        if: matrix.python-version == '3.14' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg CHANGELOG.md
          git diff --staged --quiet || git commit -m "ci: update changelog and coverage badge [skip ci]"
          git push

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Bandit security scan
        run: uv run bandit -c pyproject.toml -r mtd/

      - name: Audit dependencies for vulnerabilities
        run: uv run pip-audit

  check-deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Check outdated dependencies
        run: uv pip list --outdated || true
        continue-on-error: true

      - name: Verify lock file is up to date
        run: uv lock --check
