name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What is the use case?
      placeholder: "I often need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of mtd does this relate to?
      options:
        - CLI
        - Markdown parsing
        - DOCX output
        - ODT output
        - Themes
        - New output format
        - Other

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Any mockups, examples, or references.
