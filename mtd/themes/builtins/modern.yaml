name: modern
description: Contemporary. Sans-serif, tight spacing, accent colors.

fonts:
  heading: Helvetica
  body: Helvetica
  code: Fira Code

colors:
  primary: "#6366f1"
  secondary: "#8b5cf6"
  text: "#111827"
  code_background: "#1e1e2e"

heading:
  h1:
    size: 28
    bold: true
    color: "#6366f1"
  h2:
    size: 22
    bold: true
    color: "#6366f1"
  h3:
    size: 17
    bold: true
  h4:
    size: 14
    bold: true

body:
  size: 11
  line_spacing: 1.2

code:
  size: 10

page:
  margin_top: "2cm"
  margin_bottom: "2cm"
  margin_left: "2cm"
  margin_right: "2cm"

titlepage:
  title_size: 36
  subtitle_size: 22
  info_size: 14
  spacing_top: "6cm"
